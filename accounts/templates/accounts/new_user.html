{% extends 'portal/base.html' %}
{% load string_extras %}
{% block content %}


<div class="containter-fluid text-center py-3 ">
    <h2 class="text-primary text-center mt-3"> Users:</h2>

        <div class="card mb-3 shadow-sm mt-4">
            <table class="table table-hover">
                <thead class="table-success">

                    <tr>
                        <th>Komnata</th>
                        <th>Name</th>
                        <th>Confirm</th>
                    </tr>
                </thead>
                <tbody>
                {% for user in inactive_users %}
                    <tr>
                        <td>{{user.username|split_username:0}}</td>
                        <td>{{user.username|split_username:1}}</td>
                        <td><a href="{% url 'accounts:user_confirm' user.id %}" class="btn btn-success btn-sm">Confirm</a></td>
                    </tr>
                {% empty %}
                    <tr>
                        <td colspan="4" class="text-center">Kein user bis jetzt.</td>
                    </tr>
                {% endfor %}

                </tbody>
            </table>
        </div>
</div>
<div class="containter-fluid text-center py-3 ">
    <a class="btn btn-center btn-gradient shadow rounded-2 mt-2"
                 href="{% url 'portal:main' %}">Zurück</a>

{% endblock content %}
